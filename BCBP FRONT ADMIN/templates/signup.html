<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCBP | Create Account</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f8fc;
            color: #1c1c1c;
        }

        /* NAVBAR (Consistent with Login) */
        .navbar {
            width: 100%;
            padding: 18px 65px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(6, 20, 40, 0.95);
            backdrop-filter: blur(14px);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            box-shadow: 0 4px 18px rgba(0,0,0,0.18);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo img {
            width: 55px;
            height: 55px;
            object-fit: contain;
        }

        .logo h2 { color: white; font-size: 24px; }
        .logo span { color: #d6d6d6; font-size: 12px; }

        .back-home {
            text-decoration: none;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.08);
            font-size: 14px;
            transition: 0.3s;
        }

        /* SIGNUP WRAPPER */
        .signup-wrapper {
            min-height: 100vh;
            background: linear-gradient(rgba(5, 22, 45, 0.85), rgba(5, 22, 45, 0.85)),
                        url("{{ url_for('static', filename='bg bcbp.png') }}");
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 120px 20px 60px;
        }

        .signup-container {
            width: 100%;
            max-width: 550px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 45px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
            color: white;
        }

        .section-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #f2c94c;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(242, 201, 76, 0.3);
            padding-bottom: 8px;
        }

        h1 { font-size: 32px; margin-bottom: 30px; text-align: center; }

        /* FORM STYLES */
        .input-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        input[type="text"], 
        input[type="email"], 
        input[type="password"] {
            width: 100%;
            padding: 14px 18px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            background: rgba(255,255,255,0.08);
            color: white;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: #f2c94c; background: rgba(255,255,255,0.12); }

        /* EXPERIENCE LEVEL (RADIO) */
        .radio-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 25px;
        }

        .radio-option {
            flex: 1;
            min-width: 120px;
            position: relative;
        }

        .radio-option input {
            display: none;
        }

        .radio-label {
            display: block;
            padding: 12px;
            text-align: center;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: 0.3s;
        }

        .radio-option input:checked + .radio-label {
            background: rgba(242, 201, 76, 0.2);
            border-color: #f2c94c;
            color: #f2c94c;
        }

        /* AGE VERIFICATION */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            font-size: 14px;
            color: #d9e2ec;
        }

        .checkbox-group input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        /* SUBMIT BUTTON */
        .submit-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #d4af37, #f3db8f);
            color: #0d2f5f;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(212, 175, 55, 0.3);
        }

        footer {
            background: #06111d;
            text-align: center;
            padding: 20px;
            color: #d9e2ec;
            font-size: 13px;
        }

        @media (max-width: 768px) {
            .signup-container { padding: 30px 20px; }
            .navbar { padding: 15px 20px; }
            .logo h2 { font-size: 18px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">
        <img src="{{ url_for('static', filename='bcbp.png') }}" alt="BCBP Logo">
        <div>
            <h2>BCBP</h2>
            <span>Faith • Leadership • Service</span>
        </div>
    </div>
    <a href="/" class="back-home">← Home</a>
</nav>

<section class="signup-wrapper">
    <div class="signup-container">
        <h1>Create Account</h1>

        <form id="signupForm" onsubmit="return handleSignup(event)">
            
            <div class="section-title">Step 1: Account Details</div>
            <div class="input-grid">
                <input type="text" id="username" placeholder="Username (Optional)" autocomplete="off">
                <input type="email" id="email" placeholder="Email Address" required>
                <input type="password" id="password" placeholder="Password" required>
                <input type="password" id="confirmPassword" placeholder="Confirm Password" required>
            </div>

            <div class="section-title">Step 2: Experience Level</div>
            <div class="radio-group">
                <div class="radio-option">
                    <input type="radio" name="level" id="newcomer" value="Newcomer" checked>
                    <label class="radio-label" for="newcomer">Newcomer</label>
                </div>
                <div class="radio-option">
                    <input type="radio" name="level" id="casual" value="Casual Viewer">
                    <label class="radio-label" for="casual">Casual</label>
                </div>
                <div class="radio-option">
                    <input type="radio" name="level" id="veteran" value="Veteran">
                    <label class="radio-label" for="veteran">Veteran</label>
                </div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="ageCheck" required>
                <label for="ageCheck">I am 18 years old or above 🔞</label>
            </div>

            <button type="submit" class="submit-btn">Create Account</button>
        </form>

        <p style="text-align: center; margin-top: 20px; font-size: 14px; color: #d9e2ec;">
            Already have an account? <a href="/login" style="color: #f2c94c; text-decoration: none;">Log In</a>
        </p>
    </div>
</section>

<footer>
    © 2026 Brotherhood of Christian Businessmen and Professionals
</footer>

<script>
function handleSignup(event) {
    event.preventDefault();
    
    const pass = document.getElementById("password").value;
    const confirmPass = document.getElementById("confirmPassword").value;
    const ageCheck = document.getElementById("ageCheck").checked;

    if (pass !== confirmPass) {
        alert("Passwords do not match!");
        return false;
    }

    if (pass.length < 6) {
        alert("Password must be at least 6 characters.");
        return false;
    }

    if (!ageCheck) {
        alert("You must be at least 18 years old to register.");
        return false;
    }

    alert("Registration Successful!");
    window.location.href = "/login";
}
</script>

</body>
</html>
