<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Successful | BCBP</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='forgot_password.css') }}">

    <style>
        .success-icon {
            font-size: 70px;
            margin-bottom: 20px;
        }

        .success-message {
            text-align: center;
        }

        .success-message h2 {
            color: white;
            font-size: 34px;
            margin-bottom: 14px;
        }

        .success-message p {
            color: #d9e2ec;
            line-height: 1.7;
            margin-bottom: 28px;
            font-size: 15px;
        }

        .login-success-btn {
            display: inline-block;
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #d4af37, #f3db8f);
            color: #0d2f5f;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            text-align: center;
            transition: 0.3s;
        }

        .login-success-btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">
        <img src="{{ url_for('static', filename='bcbp.png') }}" alt="BCBP Logo">
        <div>
            <h2>BCBP</h2>
            <span>Faith • Leadership • Service</span>
        </div>
    </div>

    <a href="/" class="back-home">← Back to Home</a>
</nav>

<section class="login-wrapper">
    <div class="forgot-container">
        <div class="forgot-card success-message">

            <div class="login-logo">
                <img src="{{ url_for('static', filename='bcbp.png') }}" alt="BCBP Logo">
            </div>

            <div class="success-icon">✅</div>

            <h2>Password Reset Successful!</h2>

            <p>
                Your password has been successfully updated.
                You can now log in using your new password.
            </p>

            <a href="/login" class="login-success-btn">
                Go to Log In
            </a>

        </div>
    </div>
</section>

<footer>
    <div class="footer-bottom">
         © 2026 The Brotherhood of Christian Businessmen and Professionals. All Rights Reserved.
    </div>
</footer>

</body>
</html>
