<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BCBP | Log In</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f5f8fc;
            color: #1c1c1c;
        }

        /* HEADER */
        .navbar {
            width: 100%;
            padding: 18px 65px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(6, 20, 40, 0.95);
            backdrop-filter: blur(14px);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            box-shadow: 0 4px 18px rgba(0,0,0,0.18);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo img {
            width: 55px;
            height: 55px;
            object-fit: contain;
        }

        .logo h2 {
            color: white;
            font-size: 24px;
        }

        .logo span {
            color: #d6d6d6;
            font-size: 12px;
        }

        .back-home {
            text-decoration: none;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.08);
            transition: 0.3s;
        }

        .back-home:hover {
            background: rgba(255,255,255,0.18);
        }

        /* LOGIN SECTION */
        .login-wrapper {
            min-height: 100vh;
            background:
                linear-gradient(rgba(5, 22, 45, 0.82), rgba(5, 22, 45, 0.82)),
                url("{{ url_for('static', filename='bg bcbp.png') }}");
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 140px 20px 60px;
        }

        .login-container {
            width: 100%;
            max-width: 430px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 24px;
            padding: 40px 35px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
            text-align: center;
        }

        .login-logo img {
            width: 85px;
            height: 85px;
            margin-bottom: 18px;
        }

        h1 {
            color: white;
            font-size: 34px;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #d9e2ec;
            font-size: 15px;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .input-group {
            margin-bottom: 18px;
        }

        input {
            width: 100%;
            padding: 15px 18px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            background: rgba(255,255,255,0.08);
            color: white;
            font-size: 15px;
            outline: none;
        }

        input::placeholder {
            color: #d3dce6;
        }

        .password-group {
            position: relative;
        }

        .password-group input {
            padding-right: 55px;
        }

        .toggle-password {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 20px;
            color: #f2c94c;
            z-index: 10;
            user-select: none;
        }

        input:invalid {
            border: 1px solid rgba(255, 80, 80, 0.6);
        }

        input:valid {
            border: 1px solid rgba(100, 255, 150, 0.35);
        }

        .forgot-password {
            text-align: center;
            margin-top: 16px;
            margin-bottom: 10px;
        }

        .forgot-password a {
            color: #f2c94c;
            text-decoration: none;
            font-size: 14px;
        }

        .forgot-password a:hover {
            opacity: 0.8;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #d4af37, #f3db8f);
            color: #0d2f5f;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
        }

        .signup-link {
            margin-top: 20px;
            color: white;
        }

        .signup-link a {
            color: #f2c94c;
            text-decoration: none;
        }

        footer {
            background: linear-gradient(135deg, #06111d, #0b2038);
            color: white;
        }

        .footer-bottom {
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.25);
        }

        @media screen and (max-width: 768px) {
            .navbar {
                padding: 12px 16px;
            }

            .logo img {
                width: 40px;
                height: 40px;
            }

            .logo h2 {
                font-size: 18px;
            }

            .logo span {
                font-size: 9px;
            }

            .back-home {
                font-size: 11px;
                padding: 8px 14px;
            }

            .login-container {
                padding: 28px 20px;
            }

            h1 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="logo">
        <img src="{{ url_for('static', filename='bcbp.png') }}" alt="BCBP Logo">
        <div>
            <h2>BCBP</h2>
            <span>Faith • Leadership • Service</span>
        </div>
    </div>

    <a href="/" class="back-home">← Back to Home</a>
</nav>

<section class="login-wrapper">
    <div class="login-container">

        <div class="login-logo">
            <img src="{{ url_for('static', filename='bcbp.png') }}" alt="BCBP Logo">
        </div>

        <h1>Member Login</h1>

        <p class="subtitle">
            Access your BCBP account to stay connected with faith-driven
            leadership, fellowship, and community activities.
        </p>

        <form onsubmit="return validateLogin()">
            <div class="input-group">
                <input type="email" id="email" placeholder="Email Address" required>
            </div>

            <div class="input-group password-group">
                <input type="password" id="password" placeholder="Password" required>
                <span class="toggle-password" onclick="togglePassword()">👁</span>
            </div>

            <button type="submit" class="login-btn">Log In</button>

            <div class="forgot-password">
                <a href="#">Forgot Password?</a>
            </div>
        </form>

        <p class="signup-link">
            Don’t have an account? <a href="#">Sign Up</a>
        </p>

    </div>
</section>

<footer>
    <div class="footer-bottom">
        © 2026 Brotherhood of Christian Businessmen and Professionals
    </div>
</footer>

<script>
function togglePassword() {
    const password = document.getElementById("password");

    if (password.type === "password") {
        password.type = "text";
    } else {
        password.type = "password";
    }
}

function validateLogin() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if (email === "" || password === "") {
        alert("Please fill in all required fields.");
        return false;
    }

    if (!email.includes("@")) {
        alert("Please enter a valid email address.");
        return false;
    }

    if (password.length < 6) {
        alert("Password must be at least 6 characters.");
        return false;
    }

    window.location.href = "/dashboard";
    return false;
}
</script>

</body>
</html>
