{% extends 'base.html' %}

{% block content %}

<h2>Create Event</h2>

<form method="POST">

    <div class="mb-3">

        <label class="form-label">
            Event Name
        </label>

        <input
            type="text"
            name="event_name"
            class="form-control"
            required>

    </div>

    <div class="mb-3">

        <label class="form-label">
            Event Type
        </label>

        <select
            name="event_type"
            class="form-control">

            <option>
                Friday Action Group Leader
            </option>

            <option>
                Saturday Breakfast
            </option>

        </select>

    </div>

    <div class="mb-3">

        <label class="form-label">
            Description
        </label>

        <textarea
            name="description"
            class="form-control"></textarea>

    </div>

    <div class="mb-3">

        <label class="form-label">
            Location
        </label>

        <input
            type="text"
            name="location"
            class="form-control">

    </div>

    <div class="mb-3">

        <label class="form-label">
            Event Date
        </label>

        <input
            type="date"
            name="event_date"
            class="form-control">

    </div>

    <div class="mb-3">

        <label class="form-label">
            Start Time
        </label>

        <input
            type="time"
            name="start_time"
            class="form-control">

    </div>

    <div class="mb-3">

        <label class="form-label">
            End Time
        </label>

        <input
            type="time"
            name="end_time"
            class="form-control">

    </div>

    <div class="mb-3">

        <label class="form-label">
            Expected Attendance
        </label>

        <input
            type="number"
            name="expected_attendance"
            class="form-control">

    </div>

    <div class="mb-3">

        <label class="form-label">
            Status
        </label>

        <select
            name="status"
            class="form-control">

            <option>Upcoming</option>
            <option>Ongoing</option>
            <option>Finished</option>

        </select>

    </div>

    <button
        type="submit"
        class="btn btn-success">

        Create Event

    </button>

</form>

{% endblock %}
