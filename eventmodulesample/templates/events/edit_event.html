{% extends 'base.html' %}

{% block content %}

<div class="page-header">
    <div>
        <h1 class="page-title">Edit Event</h1>
        <p class="page-subtitle">Updating: {{ event.event_name }}</p>
    </div>
    <a href="/events/{{ event.event_id }}" class="btn-champs btn-secondary-champs">← Back to Details</a>
</div>

<div class="form-card">
    <form method="POST" id="editForm" novalidate>

        <p class="form-section-title">Basic Information</p>

        <div class="form-group">
            <label class="champs-label" for="event_name">
                Event Name <span class="required-star">*</span>
            </label>
            <input
                type="text"
                id="event_name"
                name="event_name"
                class="champs-input"
                placeholder="e.g. Community Outreach Drive"
                value="{{ event.event_name }}"
                required
                maxlength="255">
            <div class="field-error" id="err_event_name"></div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="champs-label" for="event_type">
                    Event Type <span class="required-star">*</span>
                </label>
                <select id="event_type" name="event_type" class="champs-select" required>
                    <option value="" disabled>Select a type…</option>
                    {% for et in ['Friday Action Group Leader', 'Saturday Breakfast', 'Community Outreach', 'Training & Development', 'Other'] %}
                        <option value="{{ et }}" {% if event.event_type == et %}selected{% endif %}>{{ et }}</option>
                    {% endfor %}
                </select>
                <div class="field-error" id="err_event_type"></div>
            </div>

            <div class="form-group">
                <label class="champs-label" for="status">
                    Status <span class="required-star">*</span>
                </label>
                <select id="status" name="status" class="champs-select" required>
                    <option value="" disabled>Select status…</option>
                    {% for s in ['Upcoming', 'Ongoing', 'Finished', 'Cancelled'] %}
                        <option value="{{ s }}" {% if event.status == s %}selected{% endif %}>{{ s }}</option>
                    {% endfor %}
                </select>
                <div class="field-error" id="err_status"></div>
            </div>
        </div>

        <div class="form-group">
            <label class="champs-label" for="description">Description</label>
            <textarea
                id="description"
                name="description"
                class="champs-textarea"
                placeholder="Brief description of the event…"
                maxlength="2000">{{ event.description or '' }}</textarea>
        </div>

        <p class="form-section-title">Schedule & Location</p>

        <div class="form-row">
            <div class="form-group">
                <label class="champs-label" for="event_date">
                    Event Date <span class="required-star">*</span>
                </label>
                <input
                    type="date"
                    id="event_date"
                    name="event_date"
                    class="champs-input"
                    value="{{ event.event_date | safe_date('%Y-%m-%d') if event.event_date else '' }}"
                    required>
                <div class="field-error" id="err_event_date"></div>
            </div>

            <div class="form-group">
                <label class="champs-label" for="location">Location</label>
                <input
                    type="text"
                    id="location"
                    name="location"
                    class="champs-input"
                    placeholder="e.g. Barangay Hall, Naic"
                    value="{{ event.location or '' }}"
                    maxlength="255">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="champs-label" for="start_time">
                    Start Time <span class="required-star">*</span>
                </label>
                <input
                    type="time"
                    id="start_time"
                    name="start_time"
                    class="champs-input"
                    value="{{ event.start_time | to_hhmm }}"
                    required>
                <div class="field-error" id="err_start_time"></div>
            </div>

            <div class="form-group">
                <label class="champs-label" for="end_time">
                    End Time <span class="required-star">*</span>
                </label>
                <input
                    type="time"
                    id="end_time"
                    name="end_time"
                    class="champs-input"
                    value="{{ event.end_time | to_hhmm }}"
                    required>
                <div class="field-error" id="err_end_time"></div>
            </div>
        </div>

        <p class="form-section-title">Attendance</p>

        <div class="form-group" style="max-width: 240px;">
            <label class="champs-label" for="expected_attendance">Expected Attendance</label>
            <input
                type="number"
                id="expected_attendance"
                name="expected_attendance"
                class="champs-input"
                placeholder="0"
                min="1"
                max="100000"
                value="{{ event.expected_attendance or '' }}">
            <div class="field-error" id="err_expected_attendance"></div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-champs btn-primary-champs">
                Save Changes
            </button>
            <a href="/events/{{ event.event_id }}" class="btn-champs btn-secondary-champs">Cancel</a>
        </div>

    </form>
</div>

<script>
(function () {
    const form = document.getElementById('editForm');

    const rules = {
        event_name:  { required: true, label: 'Event name' },
        event_type:  { required: true, label: 'Event type' },
        status:      { required: true, label: 'Status' },
        event_date:  { required: true, label: 'Event date' },
        start_time:  { required: true, label: 'Start time' },
        end_time:    { required: true, label: 'End time' },
    };

    function showErr(name, msg) {
        const el = document.getElementById('err_' + name);
        const inp = document.getElementById(name);
        if (el) el.textContent = msg;
        if (inp) inp.classList.toggle('is-invalid', !!msg);
    }

    function validate() {
        let valid = true;

        for (const [name, rule] of Object.entries(rules)) {
            const el = document.getElementById(name);
            if (!el) continue;
            const val = el.value.trim();
            if (rule.required && !val) {
                showErr(name, rule.label + ' is required.');
                valid = false;
            } else {
                showErr(name, '');
            }
        }

        const start = document.getElementById('start_time').value;
        const end   = document.getElementById('end_time').value;
        if (start && end && end <= start) {
            showErr('end_time', 'End time must be after start time.');
            valid = false;
        }

        const att = document.getElementById('expected_attendance').value;
        if (att && parseInt(att) < 1) {
            showErr('expected_attendance', 'Attendance must be at least 1.');
            valid = false;
        }

        return valid;
    }

    form.addEventListener('submit', function (e) {
        if (!validate()) {
            e.preventDefault();
            form.querySelector('.is-invalid')?.focus();
        }
    });
})();
</script>

{% endblock %}
