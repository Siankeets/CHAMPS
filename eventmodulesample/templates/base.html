<!DOCTYPE html>
<html lang="en">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CHAMPS — Event Management</title>
 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
 
<body>
 
    <!-- ── Top Navbar ── -->
    <nav class="champs-nav">
        <div class="nav-inner">
            <a class="nav-brand" href="/events">
                <span class="brand-icon">⚡</span>
                <span class="brand-text">CHAMPS</span>
                <span class="brand-sub">Event Module</span>
            </a>
            <!-- Mobile sidebar toggle -->
            <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>
 
    <!-- ── App Shell ── -->
    <div class="app-shell">
 
        <!-- ── Sidebar ── -->
        <aside class="champs-sidebar" id="champsSidebar">
            <div class="sidebar-inner">
 
                <div class="sidebar-section-label">Main</div>
 
                <a href="/events"
                   class="sidebar-item {% if active_page == 'events' %}active{% endif %}">
                    <span class="sidebar-icon">
                        <!-- Calendar icon -->
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                            <line x1="16" y1="2" x2="16" y2="6"></line>
                            <line x1="8" y1="2" x2="8" y2="6"></line>
                            <line x1="3" y1="10" x2="21" y2="10"></line>
                        </svg>
                    </span>
                    <span class="sidebar-label">Events</span>
                </a>
 
                <a href="/members"
                   class="sidebar-item {% if active_page == 'members' %}active{% endif %}">
                    <span class="sidebar-icon">
                        <!-- Users icon -->
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                    </span>
                    <span class="sidebar-label">Members</span>
                </a>
 
                <div class="sidebar-section-label" style="margin-top: 1.25rem;">Reports</div>
 
                <a href="/attendance"
                   class="sidebar-item {% if active_page == 'attendance' %}active{% endif %}">
                    <span class="sidebar-icon">
                        <!-- Clipboard icon -->
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                            <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                            <line x1="9" y1="12" x2="15" y2="12"></line>
                            <line x1="9" y1="16" x2="13" y2="16"></line>
                        </svg>
                    </span>
                    <span class="sidebar-label">Attendance</span>
                </a>
 
            </div>
        </aside>
 
        <!-- ── Sidebar Overlay (mobile) ── -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>
 
        <!-- ── Main Content ── -->
        <main class="main-content">
 
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="champs-alert champs-alert-{{ category }} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
 
            {% block content %}
            {% endblock %}
 
        </main>
 
    </div><!-- /.app-shell -->
 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Mobile sidebar toggle
        const toggle  = document.getElementById('sidebarToggle');
        const sidebar = document.getElementById('champsSidebar');
        const overlay = document.getElementById('sidebarOverlay');
 
        function openSidebar()  { sidebar.classList.add('open'); overlay.classList.add('visible'); }
        function closeSidebar() { sidebar.classList.remove('open'); overlay.classList.remove('visible'); }
 
        toggle.addEventListener('click', () => sidebar.classList.contains('open') ? closeSidebar() : openSidebar());
        overlay.addEventListener('click', closeSidebar);
    </script>
</body>
</html>
